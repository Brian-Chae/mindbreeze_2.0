<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body { font-family: system-ui; }

/* 전체 레이아웃: height 100% + flex column */
.app { height: 100%; display: flex; flex-direction: column; }

/* 헤더 */
.header { height: 56px; background: #5F0080; color: white; display: flex; align-items: center; padding: 0 16px; font-weight: bold; flex-shrink: 0; }

/* 메인 영역: flex-1 + overflow hidden */
.main { flex: 1; min-height: 0; display: flex; flex-direction: column; }

/* 메시지 리스트: overflow-y auto */
.messages { flex: 1; min-height: 0; overflow-y: auto; padding: 16px; background: #f8f8f8; }

/* 메시지 버블 */
.msg { margin-bottom: 12px; }
.msg.mine { text-align: right; }
.msg .bubble { display: inline-block; padding: 10px 16px; border-radius: 18px; max-width: 80%; }
.msg.mine .bubble { background: #5F0080; color: white; }
.msg.other .bubble { background: white; border: 1px solid #eee; }

/* 진단 바 */
.diag { padding: 4px 16px; font-size: 10px; background: #eee; color: #666; font-family: monospace; flex-shrink: 0; }

/* 입력창 */
.input-bar { padding: 12px 16px; background: white; border-top: 1px solid #eee; display: flex; gap: 8px; flex-shrink: 0; padding-bottom: max(12px, env(safe-area-inset-bottom)); }
.input-bar input { flex: 1; padding: 10px 16px; border-radius: 20px; border: 1px solid #ddd; font-size: 14px; outline: none; }
.input-bar button { padding: 10px 20px; background: #5F0080; color: white; border: none; border-radius: 20px; font-size: 14px; cursor: pointer; }
</style>
</head>
<body>
<div class="app">
  <div class="header">💬 채팅</div>
  <div class="main">
    <div class="messages" id="msgs">
      <!-- 동적 생성 -->
    </div>
    <div class="diag" id="diag">진단: 로딩 중...</div>
    <div class="input-bar">
      <input type="text" id="inp" placeholder="메시지 입력" />
      <button id="send">전송</button>
    </div>
  </div>
</div>

<script>
const msgs = document.getElementById('msgs');
const diag = document.getElementById('diag');
const inp = document.getElementById('inp');

// 초기 메시지
const initial = [
  '안녕하세요!', '네, 안녕하세요!', '오늘 기분이 어떠세요?',
  '좀 피곤하네요...', '그렇군요. 어제 주무신 시간은?', '3시간 정도요',
  '많이 피곤하시겠네요.', '네...', '명상이라도 해보실래요?',
  '좋아요!', '그럼 잠시 눈을 감아보세요', '네...',
  '심호흡을 크게 한 번 해보세요', '후...', '좋아요, 편안해지셨나요?',
  '조금요', '계속 해볼까요?', '네 좋아요',
  '깊게 숨을 들이마시고...', '...', '천천히 내쉬세요',
  '음...', '어떠세요?', '좀 나아진 것 같아요',
  '다행이네요!', '감사합니다'
];
initial.forEach((text, i) => {
  const d = document.createElement('div');
  d.className = 'msg ' + (i % 2 === 0 ? 'mine' : 'other');
  d.innerHTML = '<span class="bubble">' + text + '</span>';
  msgs.appendChild(d);
});

// 진단
function updateDiag() {
  diag.textContent = 'H:' + msgs.clientHeight + 'px SH:' + msgs.scrollHeight + 'px O:' + (msgs.scrollHeight > msgs.clientHeight ? 'Y' : 'N') + ' OS:' + getComputedStyle(msgs).overflowY + ' P:' + msgs.parentElement.clientHeight + 'px';
}
updateDiag();
setInterval(updateDiag, 2000);

// 최하단 스크롤
msgs.scrollTop = msgs.scrollHeight;

// 전송
send.onclick = () => {
  const text = inp.value.trim();
  if (!text) return;
  const d = document.createElement('div');
  d.className = 'msg mine';
  d.innerHTML = '<span class="bubble">' + text + '</span>';
  msgs.appendChild(d);
  inp.value = '';
  msgs.scrollTop = msgs.scrollHeight;
  updateDiag();
};
inp.onkeydown = (e) => { if (e.key === 'Enter') send.click(); };
</script>
</body>
</html>
