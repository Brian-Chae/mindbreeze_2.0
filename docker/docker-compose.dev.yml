# ──────────────────────────────────────
# MIND BREEZE 2.0 — Dev Environment
# docker compose -f docker/docker-compose.dev.yml up -d
# ──────────────────────────────────────

services:
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: mindbreeze-dev-be
    env_file:
      - ../backend/.env.dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - mindbreeze-dev

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: mindbreeze-dev-fe
    volumes:
      - ../frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - mindbreeze-dev

  nginx:
    image: nginx:alpine
    container_name: mindbreeze-dev-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - mindbreeze-dev

  postgres:
    image: postgres:16-alpine
    container_name: mindbreeze-dev-db
    environment:
      POSTGRES_USER: mindbreeze
      POSTGRES_PASSWORD: mindbreeze_dev_2026
      POSTGRES_DB: mindbreeze_dev
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindbreeze -d mindbreeze_dev"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - mindbreeze-dev

  redis:
    image: redis:7-alpine
    container_name: mindbreeze-dev-redis
    restart: unless-stopped
    networks:
      - mindbreeze-dev

networks:
  mindbreeze-dev:
    driver: bridge

volumes:
  pgdata_dev:
