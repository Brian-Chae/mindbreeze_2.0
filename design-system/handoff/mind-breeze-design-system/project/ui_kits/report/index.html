<!doctype html>

<link rel="stylesheet" href="../../colors_and_type.css" />
<style>

</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<body>
<div id="app"></div>
<script type="text/babel" src="Cover.jsx"></script>
<script type="text/babel" src="Charts.jsx"></script>

                <div style={{ fontFamily: "var(--mb-font-sans)", fontWeight: 600, fontSize: 13, color: "#1F1F1F", marginTop: 4 }}>김지수 지도사</div>
              </div>

          <button className="mb-btn" style={{ marginTop: 12, width: "100%", height: 44, borderRadius: 12, fontSize: 14 }}>

    );

  ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
