<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>Buttons</title>
<link rel="stylesheet" href="_card.css" />
</head>
<body>
<div class="col">
  <div class="label-row"><span>primary · soft · outlined · disabled</span><span>height 44 · radius 12</span></div>
  <div class="row" style="gap:14px;align-items:center;">
    <button class="mb-btn">서비스 시작</button>
    <button class="mb-btn mb-btn--soft">자리번호 입력하기</button>
    <button class="mb-btn mb-btn--ghost">취소</button>
    <button class="mb-btn" disabled>등록 불가</button>
  </div>
  <div class="row" style="gap:14px;align-items:center;margin-top:6px;">
    <button class="mb-btn" style="height:48px;border-radius:40px;padding:0 22px;">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:8px;"><path d="M21.18 12.37a9 9 0 1 1-6.16-8.55"/><path d="M22 4 12 14l-3-3"/></svg>
      Sign in with Google
    </button>
    <button class="mb-btn mb-btn--soft" style="height:48px;border-radius:40px;padding:0 22px;">
      LINK BAND 등록
      <span style="display:inline-block;margin-left:10px;width:8px;height:8px;border-radius:50%;background:var(--mb-purple-100);"></span>
    </button>
  </div>
</div>
</body>
</html>
