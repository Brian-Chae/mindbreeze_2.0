<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>Imagery</title>
<link rel="stylesheet" href="_card.css" />
</head>
<body style="padding:0;background:#EBE6E2;">
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:0;height:100%;">
  <div style="position:relative;height:200px;">
    <img src="../assets/images/thumbnail1.jpg" style="width:100%;height:100%;object-fit:cover;display:block;" />
    <div style="position:absolute;left:10px;bottom:10px;font-family:var(--mb-font-mono);font-size:10px;color:#fff;background:rgba(0,0,0,.45);padding:3px 8px;border-radius:4px;">canyon · warm</div>
  </div>
  <div style="position:relative;height:200px;">
    <img src="../assets/images/thumbnail2.jpg" style="width:100%;height:100%;object-fit:cover;display:block;" />
    <div style="position:absolute;left:10px;bottom:10px;font-family:var(--mb-font-mono);font-size:10px;color:#fff;background:rgba(0,0,0,.45);padding:3px 8px;border-radius:4px;">ocean</div>
  </div>
  <div style="position:relative;height:200px;">
    <img src="../assets/images/thumbnail3.jpg" style="width:100%;height:100%;object-fit:cover;display:block;" />
    <div style="position:absolute;left:10px;bottom:10px;font-family:var(--mb-font-mono);font-size:10px;color:#fff;background:rgba(0,0,0,.45);padding:3px 8px;border-radius:4px;">forest</div>
  </div>
  <div style="position:relative;height:200px;background:#5F0080;display:flex;align-items:center;justify-content:center;">
    <img src="../assets/brand_story_brainwaves.png" style="width:88%;opacity:.9;" />
    <div style="position:absolute;left:10px;bottom:10px;font-family:var(--mb-font-mono);font-size:10px;color:#fff;background:rgba(0,0,0,.35);padding:3px 8px;border-radius:4px;">brainwave motif</div>
  </div>
</div>
</body>
</html>
