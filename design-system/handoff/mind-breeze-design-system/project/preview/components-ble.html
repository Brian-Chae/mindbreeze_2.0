<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>BLE pills</title>
<link rel="stylesheet" href="_card.css" />
<style>
  .pill {
    height:44px; border-radius:12px; padding:0 16px;
    display:inline-flex; align-items:center; gap:10px;
    font-family: var(--mb-font-sans); font-weight:600; font-size:15px;
  }
  .pill svg { width:18px; height:18px; }
</style>
</head>
<body>
<div class="col">
  <div class="label-row"><span>Link Band connection · context-aware</span><span>used in app header</span></div>
  <div class="row" style="gap:14px;flex-wrap:wrap;">
    <span class="pill" style="background:#5F0080;color:#FFFFFF;">
      LINK BAND 등록
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6.5 17.5L17.5 6.5"/><path d="M6.5 6.5l11 11"/><path d="M12 2v20"/></svg>
    </span>
    <span class="pill" style="background:#D2AEFC;color:#5F0080;">
      LB-A02E1
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6.5 17.5L17.5 6.5"/><path d="M12 2v20"/><path d="m6.5 6.5 5.5 5.5"/><path d="m17.5 17.5-5.5-5.5"/></svg>
    </span>
    <span class="pill" style="background:rgba(252,85,85,0.3);color:#FC5555;">
      LB-A02E1 · 연결 끊김
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6.5 17.5L17.5 6.5"/><path d="M3 3l18 18"/></svg>
    </span>
    <span class="pill" style="background:rgba(255,255,255,0.2);color:#FFFFFF;border:1px solid rgba(255,255,255,0.4);">
      세션 진행 중
      <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#01F0C8;box-shadow:0 0 0 4px rgba(1,240,200,0.25);"></span>
    </span>
  </div>
</div>
</body>
</html>
