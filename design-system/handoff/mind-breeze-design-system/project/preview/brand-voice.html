<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>Voice</title>
<link rel="stylesheet" href="_card.css" />
</head>
<body>
<div class="col">
  <div class="label-row"><span>voice · how MIND BREEZE speaks</span><span>Korean-first · no emoji</span></div>
  <div class="row" style="gap:14px;align-items:stretch;">
    <div style="flex:1;background:#fff;border:1px solid #EFEFEF;border-radius:14px;padding:14px;">
      <div style="font-family:var(--mb-font-sans);font-weight:600;font-size:13px;color:var(--mb-data-green);letter-spacing:0.04em;text-transform:uppercase;">do</div>
      <div style="font-family:var(--mb-font-sans);font-weight:700;font-size:18px;color:var(--mb-fg);margin-top:6px;line-height:24px;">뇌파 특허 다수 보유</div>
      <div style="font-family:var(--mb-font-text);font-weight:500;font-size:13px;color:var(--mb-fg-muted);line-height:20px;margin-top:4px;">14건의 관련 특허 다수 출품 및 취득</div>
      <div class="token" style="margin-top:8px;">Noun headlines · proof in numbers</div>
    </div>
    <div style="flex:1;background:#fff;border:1px solid #FFC9C7;border-radius:14px;padding:14px;">
      <div style="font-family:var(--mb-font-sans);font-weight:600;font-size:13px;color:var(--mb-data-red);letter-spacing:0.04em;text-transform:uppercase;">don't</div>
      <div style="font-family:var(--mb-font-sans);font-weight:700;font-size:18px;color:var(--mb-fg);margin-top:6px;line-height:24px;text-decoration:line-through;text-decoration-color:#FC5555;">우와! 정말 많은 특허가 있어요 ✨</div>
      <div style="font-family:var(--mb-font-text);font-weight:500;font-size:13px;color:var(--mb-fg-muted);line-height:20px;margin-top:4px;">No exclamations, no emoji, no second-person hype.</div>
    </div>
  </div>
</div>
</body>
</html>
