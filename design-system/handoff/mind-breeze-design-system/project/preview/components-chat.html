<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>Chat</title>
<link rel="stylesheet" href="_card.css" />
<style>
  .chat {
    background: #FFFFFF; border: 1px solid #DDDEE7; border-radius: 18px;
    overflow: hidden; display: grid; grid-template-rows: auto 1fr auto;
    height: 380px;
  }
  .chat-head {
    display:flex; align-items:center; gap: 12px;
    padding: 14px 16px; border-bottom: 1px solid #EFEFEF;
  }
  .ava {
    width: 36px; height: 36px; border-radius: 50%; flex: none;
    background: linear-gradient(135deg, #B373EF, #5F0080);
    display:flex; align-items:center; justify-content:center;
    color: #FFFFFF; font-family: var(--mb-font-sans); font-weight: 700; font-size: 13px;
    border: 2px solid #FFFFFF; box-shadow: 0 0 0 1px #DDDEE7;
  }
  .ava.client { background: linear-gradient(135deg, #FFD1A9, #E6593D); }
  .chat-meta { flex: 1; }
  .chat-name {
    font-family: var(--mb-font-sans); font-weight: 700; font-size: 14px;
    color: var(--mb-fg); letter-spacing: -0.012em;
  }
  .chat-sub {
    font-family: var(--mb-font-text); font-size: 12px; color: var(--mb-fg-muted);
    display:flex; align-items:center; gap: 6px; margin-top: 2px;
  }
  .pulse {
    width: 7px; height: 7px; border-radius: 50%; background: #59CE90;
    box-shadow: 0 0 0 2px rgba(89,206,144,0.2);
  }

  .chat-body {
    padding: 18px 16px; display: flex; flex-direction: column; gap: 10px;
    background: #FAFAFB; overflow: hidden;
  }
  .day-divider {
    font-family: var(--mb-font-mono); font-size: 10px; color: var(--mb-fg-muted);
    text-align: center; margin: 4px 0; letter-spacing: 0.08em;
  }
  .bubble-row { display:flex; gap: 8px; align-items: flex-end; }
  .bubble-row.me { justify-content: flex-end; }
  .bubble {
    max-width: 70%;
    padding: 10px 14px;
    border-radius: 16px;
    font-family: var(--mb-font-text); font-size: 13px; line-height: 19px;
    letter-spacing: 0.005em;
  }
  .bubble.them {
    background: #FFFFFF; color: var(--mb-fg); border: 1px solid #EFEFEF;
    border-bottom-left-radius: 4px;
  }
  .bubble.me {
    background: var(--mb-purple-100); color: #FFFFFF;
    border-bottom-right-radius: 4px;
  }
  .bubble.card {
    background: #FFFFFF; border: 1px solid #DDDEE7;
    padding: 12px 14px; display: flex; gap: 12px; align-items: center;
    max-width: 80%;
  }
  .bubble.card .icon {
    width: 36px; height: 36px; border-radius: 10px; background: #F5EDFC;
    display:flex; align-items:center; justify-content:center;
    color: var(--mb-purple-100); flex:none;
  }
  .bubble.card .title {
    font-family: var(--mb-font-sans); font-weight: 700; font-size: 13px;
    color: var(--mb-fg);
  }
  .bubble.card .sub {
    font-family: var(--mb-font-text); font-size: 12px; color: var(--mb-fg-muted);
    margin-top: 2px;
  }
  .time {
    font-family: var(--mb-font-mono); font-size: 10px; color: var(--mb-fg-muted);
    margin: 0 4px;
  }

  .composer {
    display:flex; gap: 8px; padding: 12px 14px; border-top: 1px solid #EFEFEF;
    background: #FFFFFF; align-items: center;
  }
  .composer .input {
    flex: 1; height: 40px; border-radius: 9999px;
    background: #F2F3F8; border: 0; padding: 0 16px;
    font-family: var(--mb-font-sans); font-size: 14px; color: var(--mb-fg); outline: none;
  }
  .composer .input::placeholder { color: var(--mb-disabled); }
  .composer .send {
    width: 40px; height: 40px; border-radius: 50%; border: 0;
    background: var(--mb-purple-100); color: #FFFFFF; cursor: pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .composer .attach {
    width: 40px; height: 40px; border-radius: 50%; border: 0;
    background: transparent; color: var(--mb-fg-muted); cursor: pointer;
    display:flex; align-items:center; justify-content:center;
  }
</style>
</head>
<body>
<div class="chat">
  <div class="chat-head">
    <div class="ava client">민</div>
    <div class="chat-meta">
      <div class="chat-name">김민지 · 참여자</div>
      <div class="chat-sub"><span class="pulse"></span>지금 활동 중</div>
    </div>
    <button class="mb-btn mb-btn--soft" style="height:32px;padding:0 12px;font-size:12px;border-radius:9999px;">리포트 보기</button>
  </div>

  <div class="chat-body">
    <div class="day-divider">5월 21일 · 목요일</div>
    <div class="bubble-row">
      <div class="ava client" style="width:24px;height:24px;font-size:10px;">민</div>
      <div class="bubble them">선생님, 오늘 세션 전에 잠깐 통화 가능하실까요?</div>
      <span class="time">14:02</span>
    </div>
    <div class="bubble-row me">
      <span class="time">14:04</span>
      <div class="bubble me">네 가능해요. 14:30에 전화드릴게요 🙂</div>
    </div>
    <div class="bubble-row">
      <div class="ava client" style="width:24px;height:24px;font-size:10px;">민</div>
      <div class="bubble card">
        <div class="icon">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        </div>
        <div>
          <div class="title">2주차 리포트.pdf</div>
          <div class="sub">2.4 MB · 조회 전</div>
        </div>
      </div>
    </div>
  </div>

  <div class="composer">
    <button class="attach">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
    </button>
    <input class="input" placeholder="메시지를 입력하세요…" />
    <button class="send" aria-label="보내기">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="m22 2-7 20-4-9-9-4 20-7Z"/></svg>
    </button>
  </div>
</div>
</body>
</html>
