<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>Borders</title>
<link rel="stylesheet" href="_card.css" />
</head>
<body>
<div class="col">
  <div class="label-row"><span>borders + dividers</span><span>1.0 → 1.6 px</span></div>
  <div style="height:60px;border:1px solid #DDDEE7;border-radius:12px;display:flex;align-items:center;padding:0 14px;background:#fff;">
    <span class="token">1px · #DDDEE7 · neutral border (inputs, lists)</span>
  </div>
  <div style="height:60px;border:1px solid #EFEFEF;border-radius:12px;display:flex;align-items:center;padding:0 14px;background:#fff;">
    <span class="token">1px · #EFEFEF · soft divider (between rows)</span>
  </div>
  <div style="height:60px;border:1.6px solid #9577D0;border-radius:24px;display:flex;align-items:center;padding:0 14px;background:#fff;">
    <span class="token">1.6px · #9577D0 (lavender) · report panel frame</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <div style="flex:1;height:1px;background:#EFEFEF;"></div>
    <span class="token">hairline divider</span>
    <div style="flex:1;height:1px;background:#EFEFEF;"></div>
  </div>
</div>
</body>
</html>
