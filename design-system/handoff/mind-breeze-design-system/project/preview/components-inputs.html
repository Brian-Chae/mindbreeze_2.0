<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>Inputs</title>
<link rel="stylesheet" href="_card.css" />
<style>
  .mb-input { display:flex; flex-direction:column; gap:6px; }
  .mb-input label { font-family: var(--mb-font-sans); font-weight:600; font-size:13px; color: var(--mb-fg); }
  .mb-input input {
    height:44px; border:1px solid #DDDEE7; border-radius:12px;
    padding:0 14px; font-family: var(--mb-font-sans); font-size:15px; color: var(--mb-fg);
    background:#FFFFFF; outline: none; transition: border var(--mb-duration-base) var(--mb-ease), box-shadow var(--mb-duration-base) var(--mb-ease);
  }
  .mb-input input::placeholder { color: var(--mb-disabled); }
  .mb-input input:focus { border-color: var(--mb-lavender); box-shadow: 0 0 0 2px rgba(179,115,239,0.25); }
  .mb-input .help { font-family: var(--mb-font-text); font-size:12px; color: var(--mb-fg-muted); }
  .mb-input .error { color: var(--mb-danger-deep); }
</style>
</head>
<body>
<div class="row" style="gap:18px;">
  <div class="mb-input" style="flex:1;">
    <label>지도사 이메일</label>
    <input value="instructor@mindbreeze.kr" />
    <span class="help">기관 발급 이메일을 입력해 주세요.</span>
  </div>
  <div class="mb-input" style="flex:1;">
    <label>자리번호</label>
    <input placeholder="예) 12" />
    <span class="help">참여자에게 안내된 자리번호</span>
  </div>
</div>
<div class="row" style="gap:18px;margin-top:14px;">
  <div class="mb-input" style="flex:1;">
    <label>등록 코드</label>
    <input value="MB-0001" style="border-color:#FC5555;box-shadow:0 0 0 2px rgba(252,85,85,0.18);" />
    <span class="help error">유효하지 않은 코드입니다.</span>
  </div>
  <div class="mb-input" style="flex:1;">
    <label>조직</label>
    <input value="비활성" disabled style="background:#F2F3F8;color:#A2A3AD;" />
    <span class="help">관리자 권한이 필요합니다.</span>
  </div>
</div>
</body>
</html>
