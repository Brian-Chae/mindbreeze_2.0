<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>Semantic</title>
<link rel="stylesheet" href="_card.css" />
</head>
<body>
<div class="row">
  <div class="swatch dark" style="background:#FF453A;">
    <div><div class="name">Danger</div><div style="font-size:11px;opacity:.85;">--mb-danger</div></div>
    <div class="hex">#FF453A</div>
  </div>
  <div class="swatch dark" style="background:#FC5555;">
    <div><div class="name">Danger soft</div></div>
    <div class="hex">#FC5555</div>
  </div>
  <div class="swatch light" style="background:#EFC14C;">
    <div><div class="name">Warning</div></div>
    <div class="hex">#EFC14C</div>
  </div>
  <div class="swatch dark" style="background:#59CE90;">
    <div><div class="name">Success</div></div>
    <div class="hex">#59CE90</div>
  </div>
  <div class="swatch dark" style="background:#7878FA;">
    <div><div class="name">Info</div></div>
    <div class="hex">#7878FA</div>
  </div>
  <div class="swatch light" style="background:#01F0C8;">
    <div><div class="name">Accent · mint</div></div>
    <div class="hex">#01F0C8</div>
  </div>
</div>
</body>
</html>
