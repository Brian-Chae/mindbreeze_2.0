<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>Backgrounds</title>
<link rel="stylesheet" href="_card.css" />
</head>
<body>
<div class="row">
  <div class="swatch light" style="background:#EBE6E2;border:1px solid #DDDEE7;">
    <div><div class="name">Cream</div><div style="font-size:11px;color:var(--mb-fg-muted);">marketing hero</div></div>
    <div class="hex">#EBE6E2</div>
  </div>
  <div class="swatch light" style="background:#FFFFFF;border:1px solid #DDDEE7;">
    <div><div class="name">White</div><div style="font-size:11px;color:var(--mb-fg-muted);">surface</div></div>
    <div class="hex">#FFFFFF</div>
  </div>
  <div class="swatch light" style="background:#F2F3F8;">
    <div><div class="name">Bg 10</div></div>
    <div class="hex">#F2F3F8</div>
  </div>
  <div class="swatch light" style="background:#EFEFEF;">
    <div><div class="name">Bg 20</div></div>
    <div class="hex">#EFEFEF</div>
  </div>
  <div class="swatch light" style="background:#DDDEE7;">
    <div><div class="name">Border</div></div>
    <div class="hex">#DDDEE7</div>
  </div>
  <div class="swatch dark" style="background:#191A1E;">
    <div><div class="name">Black · label 80</div></div>
    <div class="hex">#191A1E</div>
  </div>
