<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>Data palette</title>
<link rel="stylesheet" href="_card.css" />
</head>
<body>
<div class="col" style="gap:8px;">
  <div class="tile-meta">REPORT · used inside AI report charts only — not a general UI palette</div>
  <div class="row" style="gap:8px;">
    <div class="swatch light" style="background:#01F0C8;min-height:64px;"><div class="name">Mint</div><div class="hex">#01F0C8</div></div>
    <div class="swatch dark" style="background:#5F0080;min-height:64px;"><div class="name">Purple</div><div class="hex">#5F0080</div></div>
    <div class="swatch dark" style="background:#7878FA;min-height:64px;"><div class="name">Blue</div><div class="hex">#7878FA</div></div>
    <div class="swatch dark" style="background:#59CE90;min-height:64px;"><div class="name">Green</div><div class="hex">#59CE90</div></div>
    <div class="swatch dark" style="background:#5E704F;min-height:64px;"><div class="name">Khaki</div><div class="hex">#5E704F</div></div>
  </div>
  <div class="row" style="gap:8px;">
    <div class="swatch dark" style="background:#E15895;min-height:64px;"><div class="name">Pink</div><div class="hex">#E15895</div></div>
    <div class="swatch dark" style="background:#E6593D;min-height:64px;"><div class="name">Orange</div><div class="hex">#E6593D</div></div>
    <div class="swatch dark" style="background:#EFC14C;min-height:64px;color:#1F1F1F;"><div class="name">Yellow</div><div class="hex">#EFC14C</div></div>
    <div class="swatch dark" style="background:#89CCD5;min-height:64px;color:#1F1F1F;"><div class="name">Mint·data</div><div class="hex">#89CCD5</div></div>
    <div class="swatch dark" style="background:#57849C;min-height:64px;"><div class="name">Deep mint</div><div class="hex">#57849C</div></div>
  </div>
</div>
</body>
</html>
